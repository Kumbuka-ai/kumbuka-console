name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (vX.Y.Z)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  verify:
    name: verify (re-run tests at tag)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  console-image:
    name: console · build & push
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: derive tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          if [ -z "$REF" ] || [ "$REF" = "$GITHUB_REF" ]; then
            REF="$INPUT_TAG"
          fi
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
          echo "owner=$(printf "%s" "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")" >> "$GITHUB_OUTPUT"

      # Stamp the release version into package.json so the Next.js build inlines
      # it as CONSOLE_VERSION (src/lib/version.ts reads package.json — the SSOT).
      # Without this the footer showed the static dev version 0.1.0. No git commit.
      - name: stamp package version
        run: npm pkg set version="${{ steps.meta.outputs.version }}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/kumbuka-console:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/kumbuka-console:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/kumbuka-console:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=console
          cache-to: type=gha,scope=console,mode=max

  npm-packages:
    name: packages · publish to GH npm
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@kumbuka-ai'

      - id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          if [ -z "$REF" ] || [ "$REF" = "$GITHUB_REF" ]; then
            REF="$INPUT_TAG"
          fi
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - run: pnpm install --frozen-lockfile

      - name: align package versions to tag
        run: |
          V="${{ steps.meta.outputs.version }}"
          for PKG in packages/ui packages/api-client; do
            node -e "const fs=require('fs');const p='${PKG}/package.json';const j=JSON.parse(fs.readFileSync(p));j.version=process.env.V;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"
          done
        env:
          V: ${{ steps.meta.outputs.version }}

      # The app package itself, so a downstream build can depend on it
      # (docs/extension-points.md). The console-image job stamps the root
      # version in ITS OWN checkout (for CONSOLE_VERSION inlining); that
      # never reaches this job, so the root is stamped here too. Same
      # mechanism, no git commit.
      - name: align root package version to tag
        run: npm pkg set version="${{ steps.meta.outputs.version }}"

      - name: publish @kumbuka-ai/ui
        working-directory: packages/ui
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: publish @kumbuka-ai/api-client
        working-directory: packages/api-client
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: publish @kumbuka-ai/console
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: github release
    needs: [console-image, npm-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          if [ -z "$REF" ] || [ "$REF" = "$GITHUB_REF" ]; then
            REF="$INPUT_TAG"
          fi
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - name: gh release create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --notes "
          ## Container image

          \`\`\`
          ghcr.io/${{ steps.meta.outputs.owner }}/kumbuka-console:$TAG
          \`\`\`

          Pair with \`kumbuka-server\` for end-to-end deploys."
