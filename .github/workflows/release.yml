name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (vX.Y.Z)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  verify:
    name: verify (re-run tests at tag)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  console-image:
    name: console · build & push
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: derive tag
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          if [ -z "$REF" ] || [ "$REF" = "$GITHUB_REF" ]; then
            REF="${{ inputs.tag }}"
          fi
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/kumbuka-console:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/kumbuka-console:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/kumbuka-console:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=console
          cache-to: type=gha,scope=console,mode=max

  github-release:
    name: github release
    needs: console-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          if [ -z "$REF" ] || [ "$REF" = "$GITHUB_REF" ]; then
            REF="${{ inputs.tag }}"
          fi
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - name: gh release create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --notes "
          ## Container image

          \`\`\`
          ghcr.io/${{ env.IMAGE_OWNER }}/kumbuka-console:$TAG
          \`\`\`

          Pair with \`kumbuka-server\` for end-to-end deploys."
