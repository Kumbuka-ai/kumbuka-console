name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm lint
        run: pnpm lint || echo "::warning::lint not configured (yet)"
        continue-on-error: true

      - name: pnpm test:coverage
        run: pnpm test:coverage

      - name: pnpm build
        run: pnpm build

      # Hand the lcov to the sonar job (downstream) — Sonar consumes it via
      # sonar.javascript.lcov.reportPaths in sonar-project.properties.
      - name: upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: console-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 1

  docker-smoke:
    name: docker build (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: kumbuka-console:ci-smoke
          cache-from: type=gha,scope=console-ci
          cache-to: type=gha,scope=console-ci,mode=max

  # ---------------------------------------------------------------------
  # Package-consumption smoke — proves @kumbuka-ai/console is consumable
  # as a package (docs/extension-points.md). Packs it and builds a minimal
  # Next 15 consumer against the tarball (transpilePackages + "@/*" alias
  # at the package src, one re-exported route, re-exported middleware).
  # If this is red, no downstream build on top of the package can work.
  # ---------------------------------------------------------------------
  package-smoke:
    name: package consumption (seam smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: pack → consume → next build
        run: bash e2e/package-consumption-smoke.sh

  # ---------------------------------------------------------------------
  # SonarQube Cloud analysis. Pure TS/JS — no compile step needed; the
  # scan-action reads sources directly. Requires SONAR_TOKEN secret +
  # Automatic Analysis turned OFF in the Sonar UI (Project → Analysis
  # Method → CI-based). Coverage wiring comes in a follow-up PR.
  # ---------------------------------------------------------------------
  sonar:
    name: code quality · SonarQube Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # `build` produces the lcov artifact we feed to Sonar.
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history for accurate new-code / blame attribution.
          fetch-depth: 0

      - name: download lcov artifact
        uses: actions/download-artifact@v4
        with:
          name: console-lcov
          path: coverage

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ---------------------------------------------------------------------
  # Responsive-overflow guard — a real-browser test for the bug class
  # vitest/jsdom cannot catch: horizontal overflow / sideways-swipeable
  # content on narrow viewports. Boots the console in full mock mode (no
  # backend, no Keycloak) and asserts no route × mobile viewport has a
  # horizontal scroll container. Playwright is installed CI-only via
  # `pnpm add` (mutates only the in-job lockfile, never committed).
  # ---------------------------------------------------------------------
  responsive:
    name: responsive layout (mobile overflow)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm build
        run: pnpm build

      - name: install Playwright (CI-only; mutates the in-job lockfile, not committed)
        run: |
          pnpm add -w -D playwright@1.49.0
          pnpm exec playwright install --with-deps chromium

      - name: start console in mock mode
        run: |
          KUMBUKA_API_MOCK=1 KUMBUKA_API_MOCK_SESSION=1 nohup pnpm start > /tmp/console.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/overview > /dev/null; then
              echo "console up after ${i} tries"; break
            fi
            sleep 2
          done

      - name: responsive-overflow check
        run: node e2e/responsive-overflow.mjs

      - name: console log (on failure)
        if: failure()
        run: tail -n 120 /tmp/console.log || true
