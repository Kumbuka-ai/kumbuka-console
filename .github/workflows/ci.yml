name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm lint
        run: pnpm lint || echo "::warning::lint not configured (yet)"
        continue-on-error: true

      - name: pnpm build
        run: pnpm build

  docker-smoke:
    name: docker build (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: kumbuka-console:ci-smoke
          cache-from: type=gha,scope=console-ci
          cache-to: type=gha,scope=console-ci,mode=max

  # ---------------------------------------------------------------------
  # SonarQube Cloud analysis. Pure TS/JS — no compile step needed; the
  # scan-action reads sources directly. Requires SONAR_TOKEN secret +
  # Automatic Analysis turned OFF in the Sonar UI (Project → Analysis
  # Method → CI-based). Coverage wiring comes in a follow-up PR.
  # ---------------------------------------------------------------------
  sonar:
    name: code quality · SonarQube Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history for accurate new-code / blame attribution.
          fetch-depth: 0

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
