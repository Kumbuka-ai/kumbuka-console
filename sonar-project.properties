# SonarQube Cloud — kumbuka-console (Next.js console + pnpm workspace).
#
# CI-based scan runs in .github/workflows/ci.yml (job: "sonar"). Pure
# TypeScript/JavaScript analysis, no compile step needed.
sonar.organization=kumbuka-ai
sonar.projectKey=Kumbuka-ai_kumbuka-console

sonar.sources=src,packages
sonar.sourceEncoding=UTF-8

# Vitest v8 lcov coverage — produced by `pnpm test:coverage`. The lcov
# scope is intentionally narrow (see vitest.config.ts): widening it
# would have Sonar report 0% on files we don't unit-test and drop the
# coverage metric (Sonar treats lcov as ground truth).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test files are sources for coverage but not subjects of rule analysis.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions — context false-positives, not laziness:
#  - design/prototype/**: throwaway design mockups (`*.jsx` files used to
#    iterate on UI ideas before they're translated into TypeScript +
#    `packages/ui`). They are NOT shipped to users and NOT built. Sonar
#    flags ~250 findings (S2004, S3776, S6438, S6774, etc.) which would
#    be addressed by deleting the prototype, not editing it.
#  - design/**: any other design-only assets that aren't part of the
#    runtime bundle.
#  - **/node_modules/**, **/.next/**, **/*.min.js: build/runtime output.
sonar.exclusions=design/**,**/node_modules/**,**/.next/**,**/*.min.js
